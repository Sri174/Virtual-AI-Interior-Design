<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interior Design</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .design-preview { width: 100%; height: 400px; border: 2px dashed #ccc; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Interior Design Generator</h1>
        <select id="style-selector">
            <option value="modern">Modern</option>
            <option value="minimalist">Minimalist</option>
            <option value="vintage">Vintage</option>
        </select>
        <button id="generate-btn">Generate Design</button>
        <div class="design-preview" id="design-preview">
            <p>Your AI-generated design will appear here.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
